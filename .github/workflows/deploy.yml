name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm install -g markdown-it
        npm install -g markdown-it-anchor
        npm install -g markdown-it-table-of-contents
    
    - name: Build HTML from Markdown
      run: |
        cat > build.js << 'EOF'
        const fs = require('fs');
        const MarkdownIt = require('markdown-it');
        
        const md = new MarkdownIt({
          html: true,
          linkify: true,
          typographer: true
        });
        
        const content = fs.readFileSync('OpenClaw从零开始养成计划.md', 'utf8');
        const html = md.render(content);
        
        const template = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 从零开始养成计划</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #334155;
            --code-bg: #f1f5f9;
            --border-color: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            color: var(--text-color);
            background: var(--bg-color);
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            font-size: 2.5em;
            color: var(--primary-color);
            margin-bottom: 0.5em;
            padding-bottom: 0.3em;
            border-bottom: 3px solid var(--primary-color);
        }
        
        h2 {
            font-size: 1.8em;
            margin-top: 1.5em;
            margin-bottom: 0.8em;
            color: var(--primary-color);
            padding-bottom: 0.3em;
            border-bottom: 2px solid var(--border-color);
        }
        
        h3 {
            font-size: 1.4em;
            margin-top: 1.2em;
            margin-bottom: 0.6em;
            color: #475569;
        }
        
        p {
            margin-bottom: 1em;
        }
        
        code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: #dc2626;
        }
        
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1em 0;
        }
        
        pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }
        
        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }
        
        th {
            background: var(--code-bg);
            font-weight: 600;
        }
        
        ul, ol {
            margin-left: 2em;
            margin-bottom: 1em;
        }
        
        li {
            margin-bottom: 0.5em;
        }
        
        blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 1em;
            margin: 1em 0;
            color: #64748b;
            font-style: italic;
        }
        
        a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 2em 0;
        }
        
        .toc {
            background: var(--code-bg);
            padding: 20px;
            border-radius: 8px;
            margin: 1em 0;
        }
        
        .toc ul {
            margin-left: 1em;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            h2 {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        ${html}
    </div>
</body>
</html>`;
        
        fs.writeFileSync('index.html', template);
        console.log('Build complete: index.html');
        EOF
        
        node build.js
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: html-output
        path: index.html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: html-output
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: .
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
