name: Build and Deploy to Local Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install -g markdown-it
    
    - name: Build HTML from Markdown
      run: node build.js
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: html-output
        path: index.html

  deploy-local:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: html-output
    
    - name: Deploy to Local Web Server
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SERVER_SSH_KEY" > ~/.ssh/server_key
        chmod 600 ~/.ssh/server_key
        ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null
        ssh -i ~/.ssh/server_key $SERVER_USER@$SERVER_HOST "sudo mkdir -p /var/www/guide && sudo chown \$USER:\$USER /var/www/guide"
        scp -i ~/.ssh/server_key index.html $SERVER_USER@$SERVER_HOST:/var/www/guide/
        echo "Deployed to http://$SERVER_HOST/guide/"
